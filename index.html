<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexDown | Ultimate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81 0%, #050505 80%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .glass:hover { border-color: #6366f1; background: rgba(255, 255, 255, 0.05); }
        .loader { border-top-color: #6366f1; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="hero-glow min-h-screen">

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-indigo-500 underline decoration-2 underline-offset-4">NEXDOWN.</div>
        <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500">RapidAPI Powered</div>
    </nav>

    <main class="max-w-4xl mx-auto pt-16 px-6 text-center">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter">
            Grab <span class="text-indigo-500">Any</span> File.
        </h1>
        <p class="text-gray-400 text-lg mb-12 max-w-lg mx-auto">
            High-speed video extraction and torrent discovery. No AI, no history, just downloads.
        </p>

        <div class="glass p-2 rounded-3xl flex flex-col md:flex-row gap-2 shadow-2xl mb-12">
            <input type="text" id="mainInput" placeholder="Paste link (YT/Insta) or Search name..." 
                class="flex-1 bg-transparent p-5 text-white outline-none placeholder:text-gray-600 font-medium">
            <button onclick="engine()" class="bg-indigo-600 hover:bg-indigo-500 px-10 py-5 rounded-2xl font-extrabold transition-all shrink-0">
                START FETCH
            </button>
        </div>

        <div id="status" class="hidden mb-10">
            <div class="loader w-8 h-8 border-4 border-gray-800 rounded-full mx-auto"></div>
            <p class="text-xs text-indigo-400 font-bold mt-4 uppercase tracking-widest">Processing Secure API Request</p>
        </div>

        <div id="results" class="grid gap-4 text-left pb-20"></div>
    </main>

    <script>
        // API CONFIG FROM YOUR CODE
        const API_KEY = "b3f8c9216emsh5ac5fe04d2b894ep169fb3jsn486a932ae1da";
        const API_HOST = "best-all-in-one-video-downloader.p.rapidapi.com";

        async function engine() {
            const query = document.getElementById('mainInput').value.trim();
            const results = document.getElementById('results');
            const status = document.getElementById('status');

            if(!query) return;
            results.innerHTML = '';
            status.classList.remove('hidden');

            try {
                if(query.startsWith('http')) {
                    // DIRECT DOWNLOAD MODE (RAPIDAPI)
                    const response = await fetch(`https://${API_HOST}/index.php`, {
                        method: 'POST',
                        headers: {
                            'x-rapidapi-key': API_KEY,
                            'x-rapidapi-host': API_HOST,
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: new URLSearchParams({ url: query })
                    });

                    const data = await response.json();
                    if(data && data.medias) {
                        data.medias.forEach(m => {
                            if(m.url) renderCard(data.title || "Video File", `${m.quality} • ${m.extension}`, m.url, "DOWNLOAD");
                        });
                    } else { throw new Error(); }

                } else {
                    // TORRENT SEARCH MODE (APIBAY)
                    const res = await fetch(`https://apibay.org/q.php?q=${encodeURIComponent(query)}`);
                    const items = await res.json();
                    
                    if(items[0].info_hash === "0000000000000000000000000000000000000000") {
                        results.innerHTML = `<p class="text-center text-gray-600">No torrents found for "${query}"</p>`;
                    } else {
                        items.slice(0, 5).forEach(t => {
                            const size = (t.size / 1073741824).toFixed(2) + " GB";
                            const magnet = `magnet:?xt=urn:btih:${t.info_hash}&dn=${encodeURIComponent(t.name)}`;
                            renderCard(t.name, `Seeds: ${t.seeders} | Size: ${size}`, magnet, "MAGNET");
                        });
                    }
                }
            } catch (e) {
                results.innerHTML = `
                    <div class="p-6 bg-red-900/10 border border-red-500/30 rounded-2xl text-red-400 text-center">
                        <p class="font-bold">Fetch Failed</p>
                        <p class="text-xs opacity-70">Check your API Key quota or try a different URL.</p>
                    </div>`;
            } finally {
                status.classList.add('hidden');
            }
        }

        function renderCard(title, meta, link, btnText) {
            const results = document.getElementById('results');
            results.innerHTML += `
                <div class="glass p-6 rounded-3xl flex justify-between items-center group">
                    <div class="overflow-hidden pr-6">
                        <h3 class="font-bold text-base truncate text-white mb-1">${title}</h3>
                        <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">${meta}</p>
                    </div>
                    <a href="${link}" target="_blank" class="bg-white text-black px-6 py-3 rounded-xl text-xs font-black hover:bg-indigo-500 hover:text-white transition-all shrink-0">
                        ${btnText}
                    </a>
                </div>`;
        }
    </script>
</body>
</html>
