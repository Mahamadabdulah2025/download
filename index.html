<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexDown | Pro Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #e4e4e7; font-family: sans-serif; }
        .glass { background: rgba(23, 23, 27, 0.8); border: 1px solid #27272a; backdrop-filter: blur(12px); }
        .btn-primary { background: #6366f1; transition: 0.3s; }
        .btn-primary:hover { background: #4f46e5; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-2xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-white mb-2">NEXDOWN <span class="text-indigo-500">WEB</span></h1>
            <p class="text-gray-500">Video, Documents & Torrent Search</p>
        </div>

        <div class="glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 mb-8">
            <input type="text" id="targetInput" placeholder="Paste link (YouTube/Insta) or search name..." 
                class="flex-1 bg-transparent p-4 outline-none text-white">
            <button onclick="runEngine()" class="btn-primary px-8 py-4 rounded-xl font-bold text-white">
                Fetch Data
            </button>
        </div>

        <div id="loader" class="hidden text-center py-4">
            <div class="inline-block animate-spin w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full"></div>
        </div>

        <div id="display" class="space-y-3"></div>
    </div>

    <script>
        async function runEngine() {
            const query = document.getElementById('targetInput').value.trim();
            const display = document.getElementById('display');
            const loader = document.getElementById('loader');

            if(!query) return;
            display.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                if (query.startsWith('http')) {
                    // --- MEDIA DOWNLOAD LOGIC ---
                    // Using a public Cobalt instance that allows CORS
                    const response = await fetch('https://cobalt.api.unrestrained.online/api/json', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ url: query })
                    });
                    const data = await response.json();
                    
                    if(data.url) {
                        addItem(data.url, "Download Found", "Ready to stream/save", "Download");
                    } else if (data.picker) {
                        data.picker.forEach(item => addItem(item.url, "Gallery Item", item.type, "Download"));
                    } else {
                        throw new Error("No link found");
                    }
                } else {
                    // --- TORRENT SEARCH LOGIC ---
                    // APIBay (TPB) usually allows CORS, but we use a mirror if it fails
                    const res = await fetch(`https://apibay.org/q.php?q=${encodeURIComponent(query)}`);
                    const items = await res.json();
                    
                    if(!items || items[0].name === "No results found") {
                        display.innerHTML = `<p class="text-center text-gray-500">No results found for "${query}"</p>`;
                    } else {
                        items.slice(0, 5).forEach(t => {
                            const size = (t.size / (1024*1024*1024)).toFixed(2) + " GB";
                            const mag = `magnet:?xt=urn:btih:${t.info_hash}&dn=${encodeURIComponent(t.name)}`;
                            addItem(mag, t.name, `Seeds: ${t.seeders} | Size: ${size}`, "Magnet");
                        });
                    }
                }
            } catch (err) {
                console.error(err);
                display.innerHTML = `
                    <div class="p-4 bg-red-900/20 border border-red-500/50 rounded-xl text-red-400 text-sm">
                        <strong>Request Blocked:</strong> Browsers block direct downloads from some sites. 
                        <br>Try a different URL or use a "CORS Unblocker" extension.
                    </div>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function addItem(url, title, sub, btnText) {
            const display = document.getElementById('display');
            display.innerHTML += `
                <div class="glass p-4 rounded-xl flex justify-between items-center group hover:bg-white/5 transition">
                    <div class="overflow-hidden pr-4">
                        <h3 class="font-bold text-sm truncate text-white">${title}</h3>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">${sub}</p>
                    </div>
                    <a href="${url}" target="_blank" class="bg-white text-black text-xs font-black px-4 py-2 rounded-lg hover:bg-indigo-400 transition">
                        ${btnText}
                    </a>
                </div>`;
        }
    </script>
</body>
</html>
