<script>
    // YOUR API CONFIG
    const API_KEY = "b3f8c9216emsh5ac5fe04d2b894ep169fb3jsn486a932ae1da";
    const API_HOST = "best-all-in-one-video-downloader.p.rapidapi.com";

    async function engine() {
        const query = document.getElementById('mainInput').value.trim();
        const results = document.getElementById('results');
        const status = document.getElementById('status');

        if(!query) return;
        results.innerHTML = '';
        status.classList.remove('hidden');

        try {
            if(query.startsWith('http')) {
                // We use the RapidAPI endpoint. 
                // Note: RapidAPI usually handles CORS on their end, but if it fails, 
                // it's often because the 'Content-Type' or 'Mode' is restricted.
                
                const response = await fetch(`https://${API_HOST}/index.php`, {
                    method: 'POST',
                    // Using 'cors' mode explicitly
                    mode: 'cors', 
                    headers: {
                        'x-rapidapi-key': API_KEY,
                        'x-rapidapi-host': API_HOST,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({ url: query })
                });

                if (!response.ok) throw new Error("API_REJECTION");

                const data = await response.json();
                
                if(data && data.medias && data.medias.length > 0) {
                    data.medias.forEach(m => {
                        if(m.url) renderCard(data.title || "Video File", `${m.quality} • ${m.extension}`, m.url, "DOWNLOAD");
                    });
                } else {
                    results.innerHTML = `<p class="text-center text-yellow-500 italic">Link recognized, but no media files were found. The video might be private or deleted.</p>`;
                }

            } else {
                // TORRENT SEARCH MODE (APIBay)
                // Torrent APIs are usually open-access and rarely trigger CORS blocks.
                const res = await fetch(`https://apibay.org/q.php?q=${encodeURIComponent(query)}`);
                const items = await res.json();
                
                if(!items || items[0].info_hash === "0000000000000000000000000000000000000000") {
                    results.innerHTML = `<p class="text-center text-gray-600">No torrents found for "${query}"</p>`;
                } else {
                    items.slice(0, 5).forEach(t => {
                        const size = (t.size / 1073741824).toFixed(2) + " GB";
                        const magnet = `magnet:?xt=urn:btih:${t.info_hash}&dn=${encodeURIComponent(t.name)}`;
                        renderCard(t.name, `Seeds: ${t.seeders} | Size: ${size}`, magnet, "MAGNET");
                    });
                }
            }
        } catch (e) {
            console.error(e);
            results.innerHTML = `
                <div class="p-6 bg-red-900/10 border border-red-500/30 rounded-2xl text-red-400 text-center">
                    <p class="font-bold">Fetch Blocked by Browser</p>
                    <p class="text-xs opacity-70 mb-4">The API provider is blocking the request from a public website.</p>
                    <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" class="text-indigo-400 underline text-xs">
                        Click here to "Request temporary access" to the proxy, then try again.
                    </a>
                </div>`;
        } finally {
            status.classList.add('hidden');
        }
    }

    function renderCard(title, meta, link, btnText) {
        const results = document.getElementById('results');
        results.innerHTML += `
            <div class="glass p-6 rounded-3xl flex justify-between items-center group">
                <div class="overflow-hidden pr-6">
                    <h3 class="font-bold text-base truncate text-white mb-1">${title}</h3>
                    <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">${meta}</p>
                </div>
                <a href="${link}" target="_blank" rel="noopener noreferrer" class="bg-white text-black px-6 py-3 rounded-xl text-xs font-black hover:bg-indigo-500 hover:text-white transition-all shrink-0">
                    ${btnText}
                </a>
            </div>`;
    }
</script>
