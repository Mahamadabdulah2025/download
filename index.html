<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexDown | Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="hero-gradient min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-extrabold tracking-tighter text-indigo-500">NEXDOWN.</div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
            <a href="#" class="hover:text-white">Media</a>
            <a href="#" class="hover:text-white">Documents</a>
            <a href="#" class="hover:text-white">Torrents</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto pt-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
            Download <span class="text-indigo-500">Everything.</span>
        </h1>
        <p class="text-gray-400 text-lg mb-12 max-w-xl mx-auto">
            The fastest way to grab videos, papers, and magnets without scripts or limits.
        </p>

        <div class="glass-card p-2 rounded-2xl flex flex-col md:flex-row gap-2 accent-glow mb-12">
            <input type="text" id="mainInput" placeholder="Paste link or type name..." 
                class="flex-1 bg-transparent border-none p-4 text-white focus:outline-none placeholder:text-gray-600">
            <button onclick="processRequest()" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-xl font-bold transition-all">
                Fetch Content
            </button>
        </div>

        <div id="loading" class="hidden mb-8">
            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-indigo-500 mx-auto"></div>
        </div>
        
        <div id="resultsGrid" class="grid gap-4 text-left">
            </div>
    </main>

    <script>
        async function processRequest() {
            const query = document.getElementById('mainInput').value;
            const grid = document.getElementById('resultsGrid');
            const loader = document.getElementById('loading');
            
            if(!query) return;
            
            loader.classList.remove('hidden');
            grid.innerHTML = '';

            try {
                // Determine if it's a URL or Search
                const isUrl = query.startsWith('http');
                
                if (isUrl) {
                    // Direct Download via Cobalt API (High Speed / No limit)
                    const res = await fetch('https://api.cobalt.tools/api/json', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ url: query })
                    });
                    const data = await res.json();
                    renderResult(data.url, "Source File", "Ready to Save");
                } else {
                    // Torrent Search via Public API
                    const res = await fetch(`https://api.apibay.org/q.php?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    data.slice(0, 5).forEach(t => renderResult(`magnet:?xt=urn:btih:${t.info_hash}`, t.name, `${(t.size/1073741824).toFixed(2)} GB`));
                }
            } catch (e) {
                grid.innerHTML = `<p class="text-red-400 text-center">Failed to fetch. Try a different link.</p>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderResult(url, title, meta) {
            const grid = document.getElementById('resultsGrid');
            const card = `
                <div class="glass-card p-5 rounded-xl flex justify-between items-center hover:bg-white/5 transition">
                    <div class="overflow-hidden pr-4">
                        <h3 class="font-bold truncate">${title}</h3>
                        <p class="text-xs text-gray-500">${meta}</p>
                    </div>
                    <a href="${url}" target="_blank" class="bg-white text-black px-4 py-2 rounded-lg text-sm font-bold shrink-0">
                        ${url.startsWith('magnet') ? 'Magnet' : 'Download'}
                    </a>
                </div>`;
            grid.innerHTML += card;
        }
    </script>
</body>
</html>
