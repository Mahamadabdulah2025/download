<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexDown Pro | Ultimate Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81 0%, #050505 80%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .glass:hover { border-color: #6366f1; background: rgba(255, 255, 255, 0.05); }
        .loader { border-top-color: #6366f1; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-gradient { background: linear-gradient(90deg, #6366f1, #a855f7); }
    </style>
</head>
<body class="hero-glow min-h-screen">

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-indigo-500 underline decoration-2 underline-offset-8">NEXDOWN.</div>
        <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500">RapidAPI Engine v3.0</div>
    </nav>

    <main class="max-w-4xl mx-auto pt-16 px-6 text-center">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter">
            Grab <span class="text-indigo-500">Any</span> File.
        </h1>
        <p class="text-gray-400 text-lg mb-12 max-w-lg mx-auto">
            Professional media extraction and torrent discovery. No AI, no history, just high-speed downloads.
        </p>

        <div class="glass p-2 rounded-3xl flex flex-col md:flex-row gap-2 shadow-2xl mb-12">
            <input type="text" id="mainInput" placeholder="Paste Video Link or Search Name..." 
                class="flex-1 bg-transparent p-5 text-white outline-none placeholder:text-gray-600 font-medium">
            <button onclick="engine()" class="btn-gradient hover:opacity-90 px-10 py-5 rounded-2xl font-extrabold transition-all shrink-0 text-white">
                START FETCH
            </button>
        </div>

        <div id="status" class="hidden mb-10">
            <div class="loader w-10 h-10 border-4 border-gray-800 rounded-full mx-auto"></div>
            <p class="text-xs text-indigo-400 font-bold mt-4 uppercase tracking-widest">Bypassing CORS & Fetching Data</p>
        </div>

        <div id="results" class="grid gap-4 text-left pb-20"></div>
    </main>

    <script>
        // CONFIGURATION
        const API_KEY = "b3f8c9216emsh5ac5fe04d2b894ep169fb3jsn486a932ae1da";
        const API_HOST = "best-all-in-one-video-downloader.p.rapidapi.com";
        const PROXY = "https://corsproxy.io/?";

        async function engine() {
            const query = document.getElementById('mainInput').value.trim();
            const results = document.getElementById('results');
            const status = document.getElementById('status');

            if(!query) return;
            results.innerHTML = '';
            status.classList.remove('hidden');

            try {
                if(query.startsWith('http')) {
                    // --- DOWNLOAD MODE ---
                    const apiUrl = `https://${API_HOST}/index.php`;
                    const proxiedUrl = PROXY + encodeURIComponent(apiUrl);

                    const response = await fetch(proxiedUrl, {
                        method: 'POST',
                        headers: {
                            'x-rapidapi-key': API_KEY,
                            'x-rapidapi-host': API_HOST,
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: new URLSearchParams({ url: query })
                    });

                    if (!response.ok) throw new Error("API_REJECTED");

                    const data = await response.json();
                    
                    if(data && data.medias && data.medias.length > 0) {
                        data.medias.forEach(m => {
                            if(m.url) renderCard(data.title || "Video File", `${m.quality || 'HD'} • ${m.extension || 'MP4'}`, m.url, "DOWNLOAD");
                        });
                    } else {
                        results.innerHTML = `<div class="glass p-6 rounded-2xl text-center text-yellow-500">No media found. The link might be private or unsupported.</div>`;
                    }

                } else {
                    // --- TORRENT SEARCH MODE ---
                    const res = await fetch(`https://apibay.org/q.php?q=${encodeURIComponent(query)}`);
                    const items = await res.json();
                    
                    if(!items || items[0].info_hash === "0000000000000000000000000000000000000000") {
                        results.innerHTML = `<div class="glass p-6 rounded-2xl text-center text-gray-500">No torrents found for "${query}"</div>`;
                    } else {
                        items.slice(0, 8).forEach(t => {
                            const size = (t.size / 1073741824).toFixed(2) + " GB";
                            const magnet = `magnet:?xt=urn:btih:${t.info_hash}&dn=${encodeURIComponent(t.name)}`;
                            renderCard(t.name, `Seeds: ${t.seeders} | Size: ${size}`, magnet, "MAGNET");
                        });
                    }
                }
            } catch (e) {
                console.error(e);
                results.innerHTML = `
                    <div class="p-6 bg-red-900/10 border border-red-500/30 rounded-3xl text-red-400 text-center">
                        <p class="font-bold mb-1 text-lg">Fetch Failed</p>
                        <p class="text-xs opacity-70">Make sure your API Key has remaining quota and the URL is public.</p>
                    </div>`;
            } finally {
                status.classList.add('hidden');
            }
        }

        function renderCard(title, meta, link, btnText) {
            const results = document.getElementById('results');
            results.innerHTML += `
                <div class="glass p-6 rounded-3xl flex justify-between items-center group animate-in fade-in duration-500">
                    <div class="overflow-hidden pr-6">
                        <h3 class="font-bold text-base truncate text-white mb-1 group-hover:text-indigo-400 transition-colors">${title}</h3>
                        <p class="text-[10px] text-gray-500 font-black uppercase tracking-[0.15em]">${meta}</p>
                    </div>
                    <a href="${link}" target="_blank" rel="noopener noreferrer" class="bg-white text-black px-6 py-3 rounded-xl text-xs font-black hover:bg-indigo-500 hover:text-white transition-all transform hover:scale-105 shrink-0">
                        ${btnText}
                    </a>
                </div>`;
        }
    </script>
</body>
</html>
